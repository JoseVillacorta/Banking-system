spring:
  application:
    name: oauth-server
server:
  port: 9000
logging:
  level:
    org.springframework.security: TRACE # Queremos ver todos los detalles de los Tokens en consola
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true