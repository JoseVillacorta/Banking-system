server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      enabled: true 
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*" 
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: ms-customer
          uri: lb://ms-customer
          predicates:
            - Path=/api/v1/customers/**
          filters:
            - StripPrefix=0 # Elimina el prefijo /ms-customer antes de enviar la peticion al ms
        - id: ms-account
          uri: lb://ms-account
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - StripPrefix=0
        - id: ms-transaction
          uri: lb://ms-transaction
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - StripPrefix=0
  # --- BLOQUE DE SEGURIDAD (Esto es lo que faltaba) ---
  security:
    oauth2:
      resourceserver:
        jwt:
          # Usamos host.docker.internal para que el Gateway (en Docker)
          # pueda ver al oauth-server (en tu Windows)
          issuer-uri: http://host.docker.internal:9000
  # ---------------------------------------------------


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
      
eureka:
  client:
    service-url:
      defaultZone: http://banking-registry-service:8761/eureka/
  instance:
    prefer-ip-address: true
    
          
