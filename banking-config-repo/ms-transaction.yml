spring:
  application:
    name: ms-transaction
  r2dbc:
    url: r2dbc:postgresql://localhost:5435/db_transaction_dev
    username: postgres
    password: admin
  
server:
  port: 8083
logging:
  level:
    org.springframework.r2dbc: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
